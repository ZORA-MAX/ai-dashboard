<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI应用周热度推流看板</title>
<style>
:root{
  --bg:#0f1117;--panel:#1a1d27;--panel2:#222633;--line:#2c3140;
  --txt:#e6e9f0;--muted:#8b92a6;--accent:#6c8cff;
  --t2:#ff5d5d;--t15:#ff9f43;--t12:#ffd34e;--t1:#4ecb8a;
  --font:'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:var(--font);padding:20px;font-size:14px}
.wrap{max-width:1180px;margin:0 auto}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
.sub{color:var(--muted);font-size:13px;margin-bottom:20px}
.controls{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 20px;margin-bottom:18px;display:flex;flex-wrap:wrap;gap:24px;align-items:flex-end}
.ctrl label{display:block;color:var(--muted);font-size:12px;margin-bottom:6px}
.weeks{display:flex;gap:8px}
.weeks button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:8px 14px;border-radius:8px;cursor:pointer;font-family:var(--font);font-size:13px}
.weeks button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.search input{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 12px;width:200px;font-family:var(--font)}
.search input:focus{outline:none;border-color:var(--accent)}
.tiers{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.tier{border-radius:12px;padding:14px 16px;border:1px solid var(--line);background:var(--panel)}
.tier .w{font-size:26px;font-weight:800}
.tier .lbl{font-size:12px;color:var(--muted);margin-top:2px}
.tier .rng{font-size:12px;margin-top:8px;font-family:'SF Mono',Consolas,monospace;color:var(--txt)}
.tier .cnt{font-size:12px;color:var(--muted);margin-top:4px}
.tier.t2{border-top:3px solid var(--t2)}.tier.t15{border-top:3px solid var(--t15)}
.tier.t12{border-top:3px solid var(--t12)}.tier.t1{border-top:3px solid var(--t1)}
.tablewrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.tablescroll{max-height:560px;overflow:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 14px;text-align:left;font-size:13px}
th{background:var(--panel2);color:var(--muted);font-weight:600;position:sticky;top:0;cursor:pointer;user-select:none}
th:hover{color:var(--txt)}
tbody tr{border-top:1px solid var(--line)}
tbody tr:hover{background:var(--panel2)}
.rank{color:var(--muted);font-variant-numeric:tabular-nums;width:48px}
.pv{font-family:'SF Mono',Consolas,monospace;font-variant-numeric:tabular-nums;text-align:right}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;color:#111}
.b2{background:var(--t2)}.b15{background:var(--t15)}.b12{background:var(--t12)}.b1{background:var(--t1)}
.foot{color:var(--muted);font-size:12px;margin-top:14px;line-height:1.7}
.search{margin-left:auto}
</style>
</head>
<body>
<div class="wrap">
  <h1>AI应用周热度排行榜 · 推流权重看板</h1>
  <div class="sub">数据区间 2026/05/27 – 2026/06/22 · 以周为单位 · 热度 = 该周总浏览量(page_view) · 按热度排名分位赋权</div>

  <div class="controls">
    <div class="ctrl">
      <label>选择周</label>
      <div class="weeks" id="weeks"></div>
    </div>
    <div class="ctrl search">
      <label>搜索应用</label>
      <input id="q" type="text" placeholder="名称或ID">
    </div>
  </div>

  <div class="tiers" id="tiers"></div>

  <div class="tablewrap">
    <div class="tablescroll">
      <table>
        <thead><tr>
          <th data-k="rank">#</th>
          <th data-k="name">应用名称</th>
          <th data-k="id">App ID</th>
          <th data-k="pv">周热度(总PV)</th>
          <th data-k="pct">热度分位</th>
          <th data-k="weight">推流权重系数</th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <div class="foot">
    <b>赋权规则（按当周热度排名分位）：</b>
    前 <b>10%</b> → 权重 <b>×2</b> ｜ 10%–30% → <b>×1.5</b> ｜ 30%–60% → <b>×1.2</b> ｜ 60%–100% → <b>×1</b><br>
    分位线由每周排行实时计算；切换周时各档热度区间与命中应用数会自动刷新。点击表头可排序。
  </div>
</div>

var WK=[['W1','W1: 05/27–06/02'],['W2','W2: 06/03–06/09'],['W3','W3: 06/10–06/16'],['W4','W4: 06/17–06/22']];
var state={week:'W4',sortK:'pv',sortDir:-1,q:''};

function fmt(n){return n.toLocaleString('en-US');}

// assign tier by rank-percentile; rows must be sorted desc by pv
function classify(rows){
  var n=rows.length;
  var c10=Math.ceil(n*0.10), c30=Math.ceil(n*0.30), c60=Math.ceil(n*0.60);
  return rows.map(function(r,i){
    var rank=i+1, t;
    if(rank<=c10) t={w:2,c:'2',lbl:'前10%'};
    else if(rank<=c30) t={w:1.5,c:'15',lbl:'10%–30%'};
    else if(rank<=c60) t={w:1.2,c:'12',lbl:'30%–60%'};
    else t={w:1,c:'1',lbl:'60%–100%'};
    return {id:r.id,name:r.name,pv:r.pv,rank:rank,pctPos:rank/n,weight:t.w,c:t.c,plbl:t.lbl};
  });
}
function getSorted(){
  var rows=(WEEKLY[state.week]||[]).slice().sort(function(a,b){return b.pv-a.pv;});
  return classify(rows);
}

function renderWeeks(){
  var el=document.getElementById('weeks'); el.innerHTML='';
  WK.forEach(function(w){
    var b=document.createElement('button'); b.textContent=w[1].split(':')[0];
    b.title=w[1]; if(w[0]===state.week)b.className='active';
    b.onclick=function(){state.week=w[0];render();}; el.appendChild(b);
  });
}
function renderTiers(all){
  var groups={'2':[],'15':[],'12':[],'1':[]};
  all.forEach(function(r){groups[r.c].push(r.pv);});
  function rng(a){if(!a.length)return '—';var mn=Math.min.apply(null,a),mx=Math.max.apply(null,a);return fmt(mn)+' – '+fmt(mx);}
  var defs=[
    ['2','×2','前10% 热帖','t2'],
    ['15','×1.5','10%–30%','t15'],
    ['12','×1.2','30%–60%','t12'],
    ['1','×1','60%–100%','t1']
  ];
  var el=document.getElementById('tiers'); el.innerHTML='';
  defs.forEach(function(d){
    var a=groups[d[0]];
    el.innerHTML+='<div class="tier '+d[3]+'"><div class="w">'+d[1]+'</div><div class="lbl">'+d[2]+'</div><div class="rng">热度 '+rng(a)+'</div><div class="cnt">'+a.length+' 个应用</div></div>';
  });
}
function renderRows(all){
  var rows=all.slice();
  if(state.q){var q=state.q.toLowerCase();rows=rows.filter(function(r){return r.name.toLowerCase().indexOf(q)>=0||(''+r.id).indexOf(q)>=0;});}
  rows.sort(function(a,b){
    var k=state.sortK,va,vb;
    if(k==='rank'||k==='pv'||k==='pct'){va=a.pv;vb=b.pv;}
    else if(k==='name'){va=a.name;vb=b.name;}
    else{va=a[k];vb=b[k];}
    if(va<vb)return -state.sortDir; if(va>vb)return state.sortDir; return 0;
  });
  var tb=document.getElementById('rows'); tb.innerHTML='';
  var bn={'2':'b2','15':'b15','12':'b12','1':'b1'};
  var wl={'2':'×2 (40%权重)','15':'×1.5 (30%)','12':'×1.2 (20%)','1':'×1 (10%)'};
  rows.forEach(function(r){
    var tr=document.createElement('tr');
    tr.innerHTML='<td class="rank">'+r.rank+'</td><td>'+r.name+'</td><td class="rank">'+r.id+'</td>'+
      '<td class="pv">'+fmt(r.pv)+'</td><td class="pv">前'+(r.pctPos*100).toFixed(1)+'%</td>'+
      '<td><span class="badge '+bn[r.c]+'">'+wl[r.c]+'</span></td>';
    tb.appendChild(tr);
  });
}
function render(){
  var all=getSorted();
  renderWeeks(); renderTiers(all); renderRows(all);
}
document.getElementById('q').addEventListener('input',function(e){state.q=e.target.value;render();});
document.querySelectorAll('th').forEach(function(th){
  th.onclick=function(){var k=th.dataset.k;if(state.sortK===k)state.sortDir*=-1;else{state.sortK=k;state.sortDir=-1;}render();};
});
render();
